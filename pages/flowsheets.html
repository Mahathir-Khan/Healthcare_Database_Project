<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flowsheets</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <script src="../js/script.js" defer></script>
  </head>
  <body>
    <div class="page-shell">
      <div class="layout">
        <aside class="sidebar">
          <div class="brand">SmartChart</div>
          <a class="nav-item" id="dashboard-link" href="patient.html?role=patient"
            ><span class="nav-icon">▣</span>Dashboard</a
          >
          <a class="nav-item" id="profile-link" href="profile.html?role=patient"
            ><span class="nav-icon">◌</span>Profile</a
          >
          <a
            class="nav-item"
            id="appointments-link"
            href="appointments.html?role=patient"
            ><span class="nav-icon">🗓</span>Appointments</a
          >
          <a
            class="nav-item active"
            id="flowsheets-link"
            href="flowsheets.html?role=patient"
            ><span class="nav-icon">📝</span>Flowsheets</a
          >
          <a class="nav-item" id="messages-link" href="messages.html?role=patient"
            ><span class="nav-icon">✉</span>Messages</a
          >
          <a class="nav-item" href="../index.html"
            ><span class="nav-icon">⇦</span>Logout</a
          >
        </aside>
        <main class="content">
          <header class="page-header">
            <h1>Flowsheets</h1>
            <p>Record patient vitals and observation details.</p>
          </header>

          <section class="content-card">
            <h2 id="flowsheets-heading">Patient Vitals</h2>
            <div class="toolbar provider-only">
              <label for="flowsheet-patient-filter">Patient</label>
              <select id="flowsheet-patient-filter" data-patient-select></select>
            </div>
            <table class="styled-table">
              <thead>
                <tr>
                  <th>Encounter</th>
                  <th>Date</th>
                  <th>Observation</th>
                  <th>Value</th>
                  <th>Unit</th>
                </tr>
              </thead>
              <tbody id="observations-table"></tbody>
            </table>
            <div class="notice patient-only">
              Patients can view their own flowsheet values but cannot edit them.
            </div>
          </section>

          <section class="content-card provider-only stack-section">
            <h2>Add Observation</h2>
            <form id="observation-form" class="form-grid">
              <label>
                Patient
                <select id="observation-patient" data-patient-select></select>
              </label>
              <label>
                Observation Code
                <input id="observation-code" type="text" placeholder="e.g. BP, HR, Temp" required />
              </label>
              <label>
                Value
                <input id="observation-value" type="text" placeholder="e.g. 120/80" required />
              </label>
              <label>
                Unit
                <input id="observation-unit" type="text" placeholder="e.g. mmHg" required />
              </label>
              <label>
                Recorded At
                <input id="observation-time" type="datetime-local" required />
              </label>
              <div class="form-actions">
                <button type="submit">Save observation</button>
              </div>
            </form>
            <div id="observation-status" class="notice"></div>
          </section>
        </main>
      </div>
    </div>
  </body>
</html>
