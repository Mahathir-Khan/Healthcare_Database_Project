<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flowsheets</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <script src="../js/script.js" defer></script>
  </head>
  <body>
    <div class="page-shell">
      <div class="layout">
        <aside class="sidebar">
          <div class="brand">SmartChart</div>
          <a class="nav-item" id="dashboard-link" href="patient.html?role=patient"
            ><span class="nav-icon">▣</span>Dashboard</a
          >
          <a class="nav-item" id="profile-link" href="profile.html?role=patient"
            ><span class="nav-icon">◌</span>Profile</a
          >
          <a
            class="nav-item"
            id="appointments-link"
            href="appointments.html?role=patient"
            ><span class="nav-icon">🗓</span>Appointments</a
          >
          <a
            class="nav-item active"
            id="flowsheets-link"
            href="flowsheets.html?role=patient"
            ><span class="nav-icon">📝</span>Flowsheets</a
          >
          <a class="nav-item" id="messages-link" href="messages.html?role=patient"
            ><span class="nav-icon">✉</span>Messages</a
          >
          <a class="nav-item" href="../index.html"
            ><span class="nav-icon">⇦</span>Logout</a
          >
        </aside>
        <main class="content">
          <header class="page-header">
            <h1>Flowsheets</h1>
            <p>Record patient vitals and observation details.</p>
          </header>

          <section class="content-card">
            <h2>Add Observation</h2>
            <form class="form-grid">
              <label>
                Patient Name
                <input type="text" placeholder="Enter patient name" />
              </label>
              <label>
                Observation Code
                <input type="text" placeholder="e.g. BP, HR, Temp" />
              </label>
              <label>
                Value
                <input type="text" placeholder="e.g. 120/80" />
              </label>
              <label>
                Unit
                <input type="text" placeholder="e.g. mmHg" />
              </label>
              <label>
                Recorded At
                <input type="datetime-local" />
              </label>
              <div class="form-actions">
                <button type="button" class="primary-btn">
                  Save Observation
                </button>
              </div>
            </form>
          </section>
        </main>
      </div>
    </div>
  </body>
</html>
